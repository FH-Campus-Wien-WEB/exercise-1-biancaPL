<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies!</title>
    <style>
    body {
        font-family: "Trebuchet MS", sans-serif;
        margin: 20px;
    }

    article {
        border: 6px solid rgb(212, 185, 123);
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 10px;
        background-color: rgb(255, 244, 225);
    }



    h1 { 
        font-weight: bold;
        margin: 10px;
    }


/*kommt eventuell später noch dazu*/

    h2 {
        color: #45a1c5;
        margin-top: 10px;
    }

    h3 {
    color: #b60f0f;
    margin-top: 10px;
    font-size: 18px;
}




    img {
        max-width: 150px;
        height: auto;
        border-radius: 8px;
        border: 8px solid #725b5b;
    }

    span {
        margin-right: 5px;
    }

    .genre {
        background-color: #770b0b;
        color: rgb(255, 255, 255);
        padding: 6px 12px;
        border-radius: 9px;
        font-size: 16px;
        display: inline-block;
        border: 4px solid #d4b97b;
    }


    
    ul {
        margin-top: 5px;
    }
    
</style>
    <script>
        function reverseString(s) {
            return s.split("").reverse().join("");
        }

        window.onload = function () {
            const xhr = new XMLHttpRequest()
            xhr.onload = function () {
                const bodyElement = document.querySelector("body")
                if (xhr.status == 200) {

                    /* Part 2: Build the HTML elements here and append them to the body */

                    const movies = JSON.parse(xhr.responseText);
                    const bodyElement = document.querySelector("body");

                    movies.forEach(movie => {

                        const article = document.createElement("article");

                        //titel 
                        const title = document.createElement("h1");
                        title.textContent = movie.Title;

                        //bilder
                        const img = document.createElement("img");
                        img.src = movie.Poster;

                        //wann releases 
                        const info = document.createElement("p");
                        info.textContent = movie.Runtime + "min * Released on: " + movie.Released;

                        //die genre felder
                        const genreDiv = document.createElement("div");

                        movie.Genres.forEach(g => {
                            const span = document.createElement("span");
                            span.classList.add("genre");
                            span.textContent = g;
                            genreDiv.appendChild(span);
                        });

                        //warum gehts 
                        const plot = document.createElement("p");
                        plot.textContent = movie.Plot;

                        //directors
                        const directorsTitle = document.createElement("h3");
                        directorsTitle.textContent = "Directors";

                        const directorsList = document.createElement("ul");
                        movie.Directors.forEach(d => {
                            const li = document.createElement("li");
                            li.textContent = d;
                            directorsList.appendChild(li);
                        });

                        //writers
                        const writersTitle = document.createElement("h3");
                        writersTitle.textContent = "Writers";

                        const writersList = document.createElement("ul");
                        movie.Writers.forEach(w => {
                            const li = document.createElement("li");
                            li.textContent = w;
                            writersList.appendChild(li);
                        });

                        //schauspieler
                        const actorsTitle = document.createElement("h3");
                        actorsTitle.textContent = "Actors";

                        const actorsList = document.createElement("ul");
                        movie.Actors.forEach(a => {
                            const li = document.createElement("li");
                            li.textContent = a;
                            actorsList.appendChild(li);
                        });
                        //zusammenbauen
                        article.appendChild(title);
                        article.appendChild(img);
                        article.appendChild(info);
                        article.appendChild(genreDiv);
                        article.appendChild(plot);
                        article.appendChild(directorsTitle);
                        article.appendChild(directorsList);
                        article.appendChild(writersTitle);
                        article.appendChild(writersList);
                        article.appendChild(actorsTitle);
                        article.appendChild(actorsList);

                        //auf Seite anzeigen
                        bodyElement.appendChild(article);
                    });

                } else {
                    bodyElement.append(
                        "Daten konnten nicht geladen werden, Status " +
                        xhr.status + " - " + xhr.statusText
                    )
                }
            }

            xhr.open("GET", "/movies")
            xhr.send()
        }
    </script>

</head>

<body>
</body>

</html>
